megs: 32
display_library: x, options="kbdev=0"
romimage: file=/usr/share/bochs/BIOS-bochs-latest
vgaromimage: file=/usr/share/bochs/VGABIOS-lgpl-latest
boot: cdrom
cdrom: cdrom, mode=concat, path=lebirun.iso
log: bochsout.txt
magic_break: enabled=assert
error: action=report
panic: action=ask
info: action=report
debug: action=ignore
